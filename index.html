<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にほんご — Tarjetas de vocabulario</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b66;
    --text-hint: #9b9b94;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.14);
    --accent: #c0392b;
    --accent-soft: #fdf0ef;
    --correct: #1a7a4a;
    --correct-bg: #edf7f1;
    --wrong: #c0392b;
    --wrong-bg: #fdf0ef;
    --radius: 14px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1c;
      --text-primary: #f0efe8;
      --text-secondary: #9b9b94;
      --text-hint: #6b6b66;
      --border: rgba(255,255,255,0.08);
      --border-md: rgba(255,255,255,0.13);
      --accent-soft: #2a1a19;
      --correct-bg: #0f2a1c;
      --wrong-bg: #2a1512;
    }
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-title {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .header-title span {
    color: var(--accent);
    font-size: 1.3rem;
  }

  .header-sub {
    font-size: 0.8rem;
    color: var(--text-hint);
    letter-spacing: 0.04em;
  }

  .main-layout {
    display: flex;
    flex: 1;
    gap: 0;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    min-width: 220px;
    border-right: 0.5px solid var(--border);
    padding: 1.25rem 0;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 0.7rem;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 1.25rem 0.6rem;
  }

  .lesson-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.5rem 1.25rem;
    font-size: 0.82rem;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    line-height: 1.4;
  }

  .lesson-btn:hover { background: var(--border); color: var(--text-primary); }

  .lesson-btn.active {
    color: var(--accent);
    font-weight: 500;
    background: var(--accent-soft);
  }

  .lesson-btn .jp { font-size: 0.75rem; display: block; opacity: 0.7; }

  .lesson-btn .count {
    font-size: 0.7rem;
    color: var(--text-hint);
    float: right;
    margin-top: 1px;
  }

  /* Main area */
  .quiz-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2.5rem 2rem;
    gap: 1.5rem;
  }

  /* Progress */
  .progress-row {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border-md);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.35s ease;
  }

  .progress-text {
    font-size: 0.75rem;
    color: var(--text-hint);
    white-space: nowrap;
    min-width: 40px;
    text-align: right;
  }

  /* Stats */
  .stats-row {
    width: 100%;
    max-width: 520px;
    display: flex;
    gap: 0.5rem;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.5rem 0.75rem;
    text-align: center;
  }

  .stat-val {
    font-size: 1.1rem;
    font-weight: 500;
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--text-hint);
    margin-top: 1px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .stat-val.correct { color: var(--correct); }
  .stat-val.wrong { color: var(--wrong); }

  /* Card */
  .card-container {
    width: 100%;
    max-width: 520px;
    perspective: 1000px;
  }

  .flash-card {
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: transform 0.1s;
  }

  .card-lesson-tag {
    position: absolute;
    top: 1rem;
    left: 1.25rem;
    font-size: 0.65rem;
    color: var(--text-hint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card-type-badge {
    position: absolute;
    top: 0.85rem;
    right: 1.25rem;
    font-size: 0.6rem;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    border: 0.5px solid var(--border-md);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .word-jp {
    font-size: 2.6rem;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: 0.05em;
  }

  .word-romaji {
    font-size: 0.85rem;
    color: var(--text-hint);
    letter-spacing: 0.08em;
    margin-top: 0.25rem;
    transition: opacity 0.2s;
  }

  .word-romaji.hidden {
    opacity: 0;
    pointer-events: none;
    user-select: none;
  }

  .romaji-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    user-select: none;
  }

  .romaji-toggle-label {
    font-size: 0.75rem;
    color: var(--text-hint);
    letter-spacing: 0.03em;
  }

  .toggle-track {
    width: 32px;
    height: 18px;
    background: var(--border-md);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-track.on { background: var(--accent); }

  .toggle-thumb {
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }

  .toggle-track.on .toggle-thumb { transform: translateX(14px); }

  /* Mobile lesson selector */
  .lesson-selector-mobile {
    display: none;
    margin-left: 1rem;
  }

  .lesson-selector-mobile select {
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-sm);
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
    color: var(--text-primary);
    cursor: pointer;
  }

  @media (max-width: 620px) {
    .lesson-selector-mobile { display: block; }
  }

  /* Options */
  .options-grid {
    width: 100%;
    max-width: 520px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .option-btn {
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-sm);
    padding: 0.85rem 1rem;
    font-size: 0.85rem;
    color: var(--text-primary);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    position: relative;
  }

  .option-btn:hover:not(:disabled) {
    background: var(--border);
    border-color: var(--border-md);
    transform: translateY(-1px);
  }

  .option-btn:active:not(:disabled) { transform: scale(0.98); }

  .option-btn.selected-correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
  }

  .option-btn.selected-wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .option-btn.reveal-correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
  }

  .option-btn:disabled { cursor: default; }

  .option-letter {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text-hint);
    margin-right: 0.5rem;
    letter-spacing: 0.04em;
  }

  /* Feedback */
  .feedback-row {
    width: 100%;
    max-width: 520px;
    min-height: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .feedback-msg {
    font-size: 0.82rem;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .feedback-msg.correct { color: var(--correct); }
  .feedback-msg.wrong { color: var(--wrong); }

  .next-btn {
    background: var(--text-primary);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.5rem 1.25rem;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.03em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .next-btn.visible { opacity: 1; pointer-events: all; }
  .next-btn:hover { opacity: 0.8; }

  /* Loading state */
  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 5px;
    height: 5px;
    background: var(--text-hint);
    border-radius: 50%;
    animation: dot-pulse 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* Complete screen */
  .complete-screen {
    width: 100%;
    max-width: 520px;
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .complete-screen.show { display: flex; }

  .complete-jp { font-size: 2.5rem; letter-spacing: 0.1em; }
  .complete-title { font-size: 1rem; color: var(--text-secondary); }
  .complete-score { font-size: 2.2rem; font-weight: 500; color: var(--correct); }

  .restart-btn {
    margin-top: 0.5rem;
    background: none;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-sm);
    padding: 0.6rem 1.5rem;
    font-size: 0.82rem;
    color: var(--text-primary);
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.12s;
  }

  .restart-btn:hover { background: var(--border); }

  .error-notice {
    font-size: 0.75rem;
    color: var(--text-hint);
    max-width: 520px;
    text-align: center;
    line-height: 1.6;
  }

  @media (max-width: 620px) {
    .sidebar { display: none; }
    .options-grid { grid-template-columns: 1fr; }
    .quiz-area { padding: 1.5rem 1rem; }
    .word-jp { font-size: 2rem; }
  }
</style>
</head>

<div class="main-layout">

  <main class="quiz-area" id="quizArea">

      <div class="stat"><div class="stat-val" id="statPct">—</div><div class="stat-label">Precisión</div></div>
    </div>

    <div class="card-container">
      <div class="flash-card" id="flashCard">
        <div class="card-lesson-tag" id="cardLesson"></div>
        <div class="card-type-badge" id="cardType"></div>
        <div class="word-jp" id="wordJp">…</div>
        <div class="word-romaji" id="wordRomaji"></div>
      </div>
    </div>

    <div class="options-grid" id="optionsGrid"></div>

    <div class="feedback-row">
      <div class="feedback-msg" id="feedbackMsg"></div>
      <button class="next-btn" id="nextBtn" onclick="nextCard()">Siguiente →</button>
    </div>

    <div class="complete-screen" id="completeScreen">
      <div class="complete-jp">おわり</div>
      <div class="complete-title">¡Lección completada!</div>
      <div class="complete-score" id="completeSc"></div>
      <button class="restart-btn" onclick="restartLesson()">Repetir lección</button>
    </div>

    <p class="error-notice" id="errorNotice" style="display:none"></p>
  </main>
</div>

const LESSONS = Object.keys(VOCAB);

let currentLesson = LESSONS[0];
let queue = [];
let currentIdx = 0;
let currentOptions = [];
let answered = false;
let stats = { correct: 0, wrong: 0 };
let loadingOptions = false;

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="sidebar-label">Secciones</div>';
  LESSONS.forEach(key => {
    const lesson = VOCAB[key];
    const btn = document.createElement('button');
    btn.className = 'lesson-btn' + (key === currentLesson ? ' active' : '');
    btn.innerHTML = `${lesson.label} <span class="count">${lesson.words.length}</span><span class="jp">${key}</span>`;
    btn.onclick = () => selectLesson(key);
    sidebar.appendChild(btn);
  });

  // Build mobile selector
  const mobileSelect = document.getElementById('lessonSelectorMobile');
  const select = document.createElement('select');
  select.onchange = (e) => selectLesson(e.target.value);
  LESSONS.forEach(key => {
    const lesson = VOCAB[key];
    const option = document.createElement('option');
    option.value = key;
    option.textContent = lesson.label;
    select.appendChild(option);
  });
  select.value = currentLesson;
  mobileSelect.innerHTML = '';
  mobileSelect.appendChild(select);
}

function selectLesson(key) {
  currentLesson = key;
  stats = { correct: 0, wrong: 0 };
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lesson-btn')[LESSONS.indexOf(key)].classList.add('active');
  // Update mobile selector
  const mobileSelect = document.getElementById('lessonSelectorMobile').querySelector('select');
  if (mobileSelect) mobileSelect.value = key;
  document.getElementById('completeScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  startLesson();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startLesson() {
  const words = VOCAB[currentLesson].words;
  queue = shuffle(words);
  currentIdx = 0;
  stats = { correct: 0, wrong: 0 };
  updateStats();
  showCard();
}

function updateStats() {
  document.getElementById('statCorrect').textContent = stats.correct;
  document.getElementById('statWrong').textContent = stats.wrong;
  const total = stats.correct + stats.wrong;
  document.getElementById('statPct').textContent = total ? Math.round(stats.correct / total * 100) + '%' : '—';
  const pct = queue.length ? Math.round(currentIdx / queue.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentIdx} / ${queue.length}`;
}

async function showCard() {
  if (currentIdx >= queue.length) {
    showComplete();
    return;
  }

  const word = queue[currentIdx];
  document.getElementById('wordJp').textContent = word.jp;
  document.getElementById('wordRomaji').textContent = word.romaji;
  document.getElementById('cardLesson').textContent = VOCAB[currentLesson].label;
  document.getElementById('cardType').textContent = word.type;
  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('feedbackMsg').className = 'feedback-msg';
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('optionsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:1rem;color:var(--text-hint);font-size:0.8rem"><div class="loading-dots"><span></span><span></span><span></span></div> generando opciones…</div>';
  document.getElementById('errorNotice').style.display = 'none';
  answered = false;

  const options = await generateOptions(word);
  currentOptions = options;
  renderOptions(options, word);
  updateStats();
}

async function generateOptions(word) {
  const allWords = LESSONS.flatMap(k => VOCAB[k].words);
  const pool = allWords.filter(w => w.es !== word.es);

  try {
    const otherAnswers = shuffle(pool).slice(0, 8).map(w => w.es).join(', ');
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Eres un asistente para generar opciones incorrectas en un quiz de vocabulario japonés. 
Responde SOLO con un array JSON de exactamente 2 strings, sin ningún texto adicional, sin markdown, sin explicaciones.
Las opciones incorrectas deben ser plausibles pero claramente distintas del significado correcto.
Deben estar en español, ser breves (máximo 5 palabras), y no repetirse entre sí ni coincidir con el significado correcto.`,
        messages: [{
          role: 'user',
          content: `La palabra japonesa es "${word.jp}" (${word.romaji}).
Su significado correcto en español es: "${word.es}".
Tipo de palabra: ${word.type}.
Algunas otras palabras del vocabulario disponible: ${otherAnswers}.

Genera exactamente 2 traducciones incorrectas pero plausibles. Responde SOLO el array JSON, por ejemplo: ["opción1","opción2"]`
        }]
      })
    });

    if (!resp.ok) throw new Error('API error');
    const data = await resp.json();
    const text = data.content.map(c => c.text || '').join('');
    const parsed = JSON.parse(text.trim());
    if (!Array.isArray(parsed) || parsed.length < 2) throw new Error('bad response');

    const options = shuffle([word.es, parsed[0], parsed[1]]);
    return options;
  } catch (e) {
    // Fallback: pick 2 random from pool
    const fallback = shuffle(pool).slice(0, 2).map(w => w.es);
    return shuffle([word.es, ...fallback]);
  }
}

function renderOptions(options, word) {
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C'];
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectOption(btn, opt, word.es, options);
    grid.appendChild(btn);
  });
}

function selectOption(btn, selected, correct, options) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected === correct;

  if (isCorrect) {
    btn.classList.add('selected-correct');
    stats.correct++;
    const msg = document.getElementById('feedbackMsg');
    msg.textContent = '✓ Correcto';
    msg.className = 'feedback-msg correct';
  } else {
    btn.classList.add('selected-wrong');
    stats.wrong++;
    // Reveal correct answer
    allBtns.forEach(b => {
      const txt = b.textContent.replace(/^[ABC]\s*/, '').trim();
      if (txt === correct || b.innerHTML.includes(correct)) {
        b.classList.add('reveal-correct');
      }
    });
    const msg = document.getElementById('feedbackMsg');
    msg.textContent = `✗ Era: ${correct}`;
    msg.className = 'feedback-msg wrong';
  }

  updateStats();
  document.getElementById('nextBtn').classList.add('visible');
}

function nextCard() {
  currentIdx++;
  showCard();
}

function showComplete() {
  document.getElementById('completeScreen').classList.add('show');
  const total = stats.correct + stats.wrong;
  const pct = total ? Math.round(stats.correct / total * 100) : 0;
  document.getElementById('completeSc').textContent = `${stats.correct} / ${total} correctas (${pct}%)`;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `${queue.length} / ${queue.length}`;
}

function restartLesson() {
  document.getElementById('completeScreen').classList.remove('show');
  startLesson();
}

let romajiVisible = true;

function toggleRomaji() {
  romajiVisible = !romajiVisible;
  const track = document.getElementById('romajiTrack');
  const romaji = document.getElementById('wordRomaji');
  track.classList.toggle('on', romajiVisible);
  romaji.classList.toggle('hidden', !romajiVisible);
}
